- type: entity
  id: SlotMachine
  parent: BaseMachinePowered
  name: slot machine
  description: One-armed bandit. The house always wins.
  components:
  - type: SlotMachine
    rules:
      - symbols: ["seven", "seven", "seven"]
        multiplier: 777
        winText: "slot-machine-ui-win-jackpot"
      - symbols: ["seven", "seven", "seven"]
        multiplier: 100
        winText: "slot-machine-ui-win-777"
      - symbols: ["bell", "bell", "bell"]
        multiplier: 20
        winText: "slot-machine-ui-win-triple"
      - symbols: ["cherry", "cherry", "cherry"]
        multiplier: 10
        winText: "slot-machine-ui-win-cherries"
      - symbols: ["apple", "apple", "apple"]
        multiplier: 8
        winText: "slot-machine-ui-win-apples"
      - symbols: ["blue_cherry", "blue_cherry", "blue_cherry"]
        multiplier: 15
        winText: "slot-machine-ui-win-triple"
      - symbols: ["diamond", "diamond", "diamond"]
        multiplier: 50
        winText: "slot-machine-ui-win-triple"
      - symbols: ["cherry", "cherry"]
        index: 0
        multiplier: 3
        winText: "slot-machine-ui-win-cherries"
      - symbols: ["apple", "apple"]
        index: 0
        multiplier: 2
        winText: "slot-machine-ui-win-apples"
    reelPools:
      - ["cherry", "apple", "blue_cherry", "bell", "seven", "diamond"]
      - ["cherry", "apple", "blue_cherry", "bell", "seven", "diamond"]
      - ["cherry", "apple", "blue_cherry", "bell", "seven", "diamond"]
  - type: Sprite
    sprite: SS220/Shitspawn/Structures/Machines/slot_machine.rsi
    layers:
    - state: slot_machine_off
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: slot_machine_on
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: ActivatableUI
    key: enum.SlotMachineUiKey.Key
  - type: UserInterface
    interfaces:
      - key: enum.SlotMachineUiKey.Key
        type: SlotMachineBoundUserInterface
  - type: Clickable
  - type: InteractionOutline
  - type: Anchorable
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.5,0.25,0.5"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
