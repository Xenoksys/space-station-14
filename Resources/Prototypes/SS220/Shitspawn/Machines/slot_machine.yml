- type: entity
  id: SlotMachine
  parent: BaseMachinePowered
  name: slot machine
  description: One-armed bandit. The house always wins.
  components:
  - type: SlotMachine
    rules:
      - symbols: ["seven", "seven", "seven"]
        multiplier: 777
        result: Jackpot
      - symbols: ["seven", "seven", "seven"]
        multiplier: 100
        result: Triple7
      - symbols: ["bell", "bell", "bell"]
        multiplier: 20
        result: Triple
      - symbols: ["cherry", "cherry", "cherry"]
        multiplier: 10
        result: Triple
      - symbols: ["apple", "apple", "apple"]
        multiplier: 8
        result: Triple
      - symbols: ["blue_cherry", "blue_cherry", "blue_cherry"]
        multiplier: 15
        result: Triple
      - symbols: ["diamond", "diamond", "diamond"]
        multiplier: 50
        result: Triple
      - symbols: ["cherry", "cherry"]
        index: 0
        multiplier: 3
        result: CherryPair
      - symbols: ["apple", "apple"]
        index: 0
        multiplier: 2
        result: ApplePair
    reelPools:
      - ["cherry", "apple", "blue_cherry", "bell", "seven", "diamond"]
      - ["cherry", "apple", "blue_cherry", "bell", "seven", "diamond"]
      - ["cherry", "apple", "blue_cherry", "bell", "seven", "diamond"]
  - type: Sprite
    sprite: SS220/Shitspawn/Structures/Machines/slot_machine.rsi
    layers:
    - state: slot_machine_off
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: slot_machine_on
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: ActivatableUI
    key: enum.SlotMachineUiKey.Key
  - type: UserInterface
    interfaces:
    - key: enum.SlotMachineUiKey.Key
      type: SlotMachineBoundUserInterface
  - type: Clickable
  - type: InteractionOutline
  - type: Anchorable
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: Physical
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.5,0.25,0.5"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
